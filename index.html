<!DOCTYPE html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>The life of an artist</title>
    <meta name="description" content="An animated slideshow of artwork." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
  </head>
  <body>
    <div id="slideshow-container">
      <div class="flex-grid-thirds">
        <div class="col-btns">
          <button id="prev-slide">
            <img src="https://aepaints.com/images/misc/prev-next.svg" width="50" alt="Previous" />
          </button>
        </div>
        <div class="col-slides" id="slideshow"></div>
        <div class="col-btns">
          <button id="next-slide">
            <img src="https://aepaints.com/images/misc/next-prev.svg" width="50" alt="Next" />
          </button>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
    <footer>
      <p class="cr">©2025 AEPaints. All rights reserved.</p>
    </footer>
  </body>
</html>
